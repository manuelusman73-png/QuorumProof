name: Security Patching

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  audit-and-patch:
    name: Detect & Patch Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit and cargo-upgrades
        run: cargo install cargo-audit cargo-edit --locked

      - name: Audit Rust dependencies
        id: rust_audit
        run: |
          cargo audit --json > rust-audit.json 2>&1 || true
          VULN_COUNT=$(python3 -c "import json,sys; d=json.load(open('rust-audit.json')); print(len(d.get('vulnerabilities',{}).get('list',[])))" 2>/dev/null || echo 0)
          echo "vuln_count=$VULN_COUNT" >> "$GITHUB_OUTPUT"

      - name: Patch Rust dependencies
        if: steps.rust_audit.outputs.vuln_count != '0'
        run: cargo update

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit npm dependencies (api-server)
        id: npm_audit
        working-directory: api-server
        run: |
          npm audit --json > ../npm-audit.json 2>&1 || true
          VULN_COUNT=$(python3 -c "import json,sys; d=json.load(open('../npm-audit.json')); print(d.get('metadata',{}).get('vulnerabilities',{}).get('total',0))" 2>/dev/null || echo 0)
          echo "vuln_count=$VULN_COUNT" >> "$GITHUB_OUTPUT"

      - name: Patch npm dependencies (api-server)
        if: steps.npm_audit.outputs.vuln_count != '0'
        working-directory: api-server
        run: npm audit fix

      - name: Run contract tests
        run: ./scripts/test.sh

      - name: Run api-server tests
        working-directory: api-server
        run: npm ci && npm test

      - name: Open patch PR
        if: steps.rust_audit.outputs.vuln_count != '0' || steps.npm_audit.outputs.vuln_count != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: security/auto-patch-${{ github.run_number }}
          commit-message: 'chore(security): automated dependency patches'
          title: 'chore(security): automated security patches'
          body: |
            Automated security patch generated by the Security Patching workflow.

            - Rust vulnerabilities found: ${{ steps.rust_audit.outputs.vuln_count }}
            - npm vulnerabilities found: ${{ steps.npm_audit.outputs.vuln_count }}

            All tests passed before this PR was opened.
          labels: security,automated
