name: Daily Backup

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Soroban CLI
        run: |
          curl -L https://github.com/stellar/rs-soroban-cli/releases/download/v21.0.0/soroban-cli-21.0.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv soroban /usr/local/bin/

      - name: Configure Stellar Network
        run: |
          stellar network add --rpc-url https://soroban-testnet.stellar.org testnet
          stellar network add --rpc-url https://horizon.stellar.org mainnet

      - name: Backup Testnet
        env:
          STELLAR_NETWORK: testnet
          CONTRACT_QUORUM_PROOF: ${{ secrets.CONTRACT_QUORUM_PROOF_TESTNET }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        run: |
          ./scripts/backup.sh --encrypt --upload ${{ secrets.BACKUP_S3_BUCKET }}

      - name: Backup Mainnet
        env:
          STELLAR_NETWORK: mainnet
          CONTRACT_QUORUM_PROOF: ${{ secrets.CONTRACT_QUORUM_PROOF_MAINNET }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        run: |
          ./scripts/backup.sh --encrypt --upload ${{ secrets.BACKUP_S3_BUCKET }}

      - name: Verify Backups
        run: |
          ./scripts/verify_snapshot.sh backups/daily/quorumproof-*.json || true

      - name: Upload Backup Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backups
          path: backups/daily/
          retention-days: 90

      - name: Notify on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Daily backup failed. Check workflow logs.'
            })
